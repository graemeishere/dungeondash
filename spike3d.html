<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dungeon Dash — 3D renderer harness</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0812; }
    #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #hud {
      position: fixed; top: 8px; left: 8px; z-index: 10;
      font: 12px/1.4 monospace; color: #9affb0;
      background: rgba(10,8,18,0.72); padding: 8px 10px; border-radius: 6px;
      border: 1px solid #2c2640; white-space: pre; pointer-events: none;
      text-shadow: 0 1px 2px #000;
    }
    #note { position: fixed; bottom: 8px; left: 8px; z-index: 10;
      font: 11px/1.4 monospace; color: #8a82a8; pointer-events: none; }
    #err { position: fixed; inset: 0; z-index: 20; display: none;
      align-items: center; justify-content: center; color: #ff8a8a;
      font: 13px/1.5 monospace; background: rgba(10,8,18,0.92); padding: 24px; text-align: center; }
  </style>

  <!-- No build step: importmap resolves the bare "three" specifier used by
       js/render3d.js and the vendored GLTFLoader. -->
  <script type="importmap">
  { "imports": { "three": "./js/lib/three/three.module.js" } }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">booting…</div>
  <div id="note">drag = orbit · harness for js/render3d.js (Phase 1)</div>
  <div id="err"></div>

  <script type="module">
    import { DungeonRenderer } from "./js/render3d.js";

    const hud = document.getElementById("hud");
    const errEl = document.getElementById("err");
    function fail(msg) {
      errEl.style.display = "flex";
      errEl.textContent = msg + "\n\n(Serve over http — e.g. `python3 -m http.server 8000` —\nthen open this page. file:// will not load modules/GLBs.)";
      console.error(msg);
    }
    window.addEventListener("error", (e) => fail("Error: " + (e.message || e)));

    // Layout mirrors js/room.js (0=floor,1=wall,2=door): a large room to stress
    // mobile — perimeter walls, top-centre door, four 2x2 pillars.
    const W = 24, H = 16, FLOOR = 0, WALL = 1, DOOR = 2;
    const tiles = new Array(W * H).fill(FLOOR);
    const set = (x, y, v) => { tiles[y * W + x] = v; };
    for (let x = 0; x < W; x++) { set(x, 0, WALL); set(x, H - 1, WALL); }
    for (let y = 0; y < H; y++) { set(0, y, WALL); set(W - 1, y, WALL); }
    set(W / 2 - 1, 0, DOOR); set(W / 2, 0, DOOR);
    for (const [px, py] of [[6, 5], [16, 5], [6, 10], [16, 10]]) {
      for (let dy = 0; dy < 2; dy++) for (let dx = 0; dx < 2; dx++) set(px + dx, py + dy, WALL);
    }

    const canvas = document.getElementById("c");
    const dr = new DungeonRenderer(canvas);

    (async function main() {
      try { await dr.ready; } catch (e) { return fail("Failed to load kit: " + (e && e.message ? e.message : e)); }

      const built = dr.buildRoom({ tiles, w: W, h: H });
      const onResize = () => dr.resize(window.innerWidth, window.innerHeight);
      window.addEventListener("resize", onResize);
      onResize();

      // drag-to-orbit (inspection only)
      let dragging = false, lastX = 0, angle = 0;
      canvas.addEventListener("pointerdown", (e) => { dragging = true; lastX = e.clientX; });
      window.addEventListener("pointerup", () => { dragging = false; });
      window.addEventListener("pointermove", (e) => {
        if (!dragging) return; angle += (e.clientX - lastX) * 0.005; lastX = e.clientX; dr.setOrbit(angle);
      });

      let frames = 0, acc = 0, fps = 0, last = performance.now();
      function tick(now) {
        const dt = (now - last) / 1000; last = now;
        frames++; acc += dt;
        if (acc >= 0.5) { fps = frames / acc; frames = 0; acc = 0; }
        const info = dr.render();
        hud.textContent =
          `FPS            ${fps.toFixed(0)}\n` +
          `draw calls     ${info.calls}   (was 438 w/ clones)\n` +
          `triangles      ${info.triangles.toLocaleString()}\n` +
          `expected calls ${built.drawCalls}  (floor+wall+door instanced)\n` +
          `grid           ${W}x${H}  cell=${dr.CELL.toFixed(2)}  wallH=${dr.wallH.toFixed(2)}`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>

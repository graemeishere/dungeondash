name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/repository-overview-cp60ga, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Publishes the repo as-is to the gh-pages branch; the first push
      # auto-enables GitHub Pages on public repos without needing the
      # Pages API (which the workflow token may not be allowed to call).
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github,docs,DungeonDash_DesignBrief.md"
